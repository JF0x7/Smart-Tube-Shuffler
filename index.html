<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SmartTube Yu-Gi-Oh Shuffler</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>SmartTube Yu‑Gi‑Oh Image Shuffler</h1>

  <button onclick="shuffleDeck()">Shuffle</button>
  <button onclick="drawCard()">Draw 1</button>
  <button onclick="resetDeck()">Reset</button>  

  <h2>Deck (<span id="deck-count">0</span>)</h2>
  <div id="deck" class="cards"></div>

  <h2>Hand (<span id="hand-count">0</span>)</h2>
  <div id="hand" class="cards"></div>

  <script src="shuffler.js"></script>
</body>
</html>
